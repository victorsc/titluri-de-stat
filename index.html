    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {

      --surface: #151820;
      --border:  #252a35;
      --text:    #e2e8f0;
      --muted:   #8896a8;
      --accent:  #4f8ef7;
      --green:   #34d399;
      --radius:  12px;
      --gap:     1.75rem;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
      line-height: 1.6;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      text-align: center;
      padding: 2.75rem 1.25rem 1.5rem;
      border-bottom: 1px solid var(--border);
    }
    .eyebrow {
      display: inline-block;
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 0.55rem;
    }
    header h1 {
      font-size: clamp(1.5rem, 5vw, 2.4rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1.2;
    }
    header h1 span { color: var(--accent); }
    .subtitle {
      margin-top: 0.45rem;
      color: var(--muted);
      font-size: 0.88rem;
    }

    /* ── Layout ── */
    main {
      max-width: 880px;
      margin: 0 auto;
      padding: var(--gap) 1rem 3.5rem;
      display: flex;
      flex-direction: column;
      gap: var(--gap);
    }

    /* ── Card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .card-header {
      padding: 1rem 1.25rem 0.85rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }
    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .tezaur-card .dot { background: var(--green); box-shadow: 0 0 7px var(--green); }
    .fidelis-card .dot { background: var(--accent); box-shadow: 0 0 7px var(--accent); }

    .card-header h2 {
      font-size: 0.97rem;
      font-weight: 600;
    }
    .badge {
      margin-left: auto;
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 0.17rem 0.5rem;
      border-radius: 999px;
      background: rgba(255,255,255,0.06);
      color: var(--muted);
      white-space: nowrap;
    }

    /* ── Tabs ── */
    .tab-bar {
      display: flex;
      gap: 0.4rem;
      padding: 0.65rem 1.25rem 0;
      border-bottom: 1px solid var(--border);
    }
    .tab-btn {
      background: none;
      border: 1px solid transparent;
      color: var(--muted);
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      padding: 0.28rem 0.8rem;
      border-radius: 6px;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s, background 0.15s;
    }
    .tab-btn:hover { color: var(--text); }
    .tab-btn.active {
      color: var(--accent);
      border-color: var(--accent);
      background: rgba(79,142,247,0.1);
    }

    /* ── Chart panels ── */
    .chart-panel { display: none; }
    .chart-panel.active { display: block; }

    /* Scrollable chart container */
    .chart-outer {
      position: relative;
    }
    /* Fade hint on the right when chart overflows */
    .chart-outer::after {
      content: '';
      position: absolute;
      top: 0; right: 0;
      width: 40px; height: 100%;
      background: linear-gradient(to right, transparent, var(--surface));
      pointer-events: none;
      border-radius: 0 0 var(--radius) 0;
      opacity: 1;
      transition: opacity 0.2s;
    }
    .chart-outer.scrolled-end::after { opacity: 0; }

    .chart-wrap {
      overflow-x: auto;
      overflow-y: hidden;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
      /* height set by JS */
    }
    .chart-wrap::-webkit-scrollbar { height: 4px; }
    .chart-wrap::-webkit-scrollbar-track { background: transparent; }
    .chart-wrap::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .chart-wrap canvas {
      /* width & height set by JS */
      display: block;
    }

    /* ── Footer ── */
    footer {
      text-align: center;
      padding: 1.25rem 1rem 2.5rem;
      border-top: 1px solid var(--border);
      color: var(--muted);
      font-size: 0.75rem;
      line-height: 2;
    }
    footer a { color: var(--accent); text-decoration: none; }
    footer a:hover { text-decoration: underline; }
  </style>
</head>

// ── Chart builder ─────────────────────────────────────────────
const PX_PER_LABEL = 18; // minimum pixels allocated per x-axis label
const CHART_HEIGHT = 300;

function buildChart(raw, canvasId, colorMap) {
  const labels = [];
  raw.forEach(e => { if (!labels.includes(e.d)) labels.push(e.d); });

  const mats = [...new Set(raw.map(e => e.m))].sort((a, b) => {
    const n = v => v === '2d' ? 2.5 : Number(v);
    return n(a) - n(b);
  });

  const map = {};
  raw.forEach(e => {
    if (!map[e.m]) map[e.m] = {};
    map[e.m][e.d] = e.r;
  });

  const canvas = document.getElementById(canvasId);
  const wrap   = canvas.closest('.chart-wrap');
  const outer  = canvas.closest('.chart-outer');

  // Canvas width: at least fill the container, but give each label its own space
  const containerW = outer.clientWidth || window.innerWidth;
  const chartW     = Math.max(containerW, labels.length * PX_PER_LABEL);

  canvas.style.width  = chartW + 'px';
  canvas.style.height = CHART_HEIGHT + 'px';
  wrap.style.height   = CHART_HEIGHT + 'px';

  // Fade hint: hide when scrolled to end
  wrap.addEventListener('scroll', () => {
    const atEnd = wrap.scrollLeft + wrap.clientWidth >= wrap.scrollWidth - 4;
    outer.classList.toggle('scrolled-end', atEnd);
  }, { passive: true });
  // Hide fade immediately if content fits without scrolling
  if (chartW <= containerW) outer.classList.add('scrolled-end');

  new Chart(canvas, {
    type: 'line',
    data: { labels, datasets: mats.map(m => ({
      label: m === '2d' ? '2 ani (dona)' : m + ' ani',
      data: labels.map(lbl => map[m]?.[lbl] ?? null),
      borderColor: colorMap[m] || '#fff',
      backgroundColor: colorMap[m] || '#fff',
      fill: false,
      tension: 0.3,
      pointRadius: labels.map(lbl => map[m]?.[lbl] != null ? 4 : 0),
      pointHoverRadius: 7,
      spanGaps: false,
      borderWidth: 2,
    }))},
    options: {
      responsive: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: {
          position: 'top',
          labels: {
            color: '#9aa',
            font: { size: 11 },
            boxWidth: 12,
            padding: 10,
            usePointStyle: true,
            pointStyleWidth: 10,
          },
        },
        tooltip: {
          backgroundColor: 'rgba(10,12,18,0.92)',
          borderColor: '#252a35',
          borderWidth: 1,
          titleColor: '#cdd',
          bodyColor: '#aab',
          padding: 10,
          callbacks: {
            label: ctx => ctx.parsed.y != null ? `${ctx.dataset.label}: ${ctx.parsed.y}%` : null,
          },
        },
      },
      scales: {
        x: {
          ticks: {
            color: '#667',
            maxRotation: 45,
            minRotation: 30,
            font: { size: 9 },
          },
          grid: { color: 'rgba(255,255,255,0.05)' },
        },
        y: {
          ticks: {
            color: '#667',
            font: { size: 10 },
            callback: v => v + '%',
          },
          grid: { color: 'rgba(255,255,255,0.05)' },
        },
      },
    },
  });
}

// ── Init visible charts immediately, EUR lazily on tab click ──
buildChart(TEZAUR, 'tezaurChart', T_CLR);
buildChart(RON,    'ronChart',    F_CLR);

let eurBuilt = false;

document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const card = btn.closest('.fidelis-card');
    card.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    card.querySelectorAll('.chart-panel').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById(btn.dataset.target).classList.add('active');
    if (btn.dataset.target === 'eur-panel' && !eurBuilt) {
      buildChart(EUR, 'eurChart', F_CLR);
      eurBuilt = true;
    }
  });
});
</script>
