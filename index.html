<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Titluri de Stat România — Fidelis &amp; Tezaur</title>
  <meta name="description" content="Evoluția dobânzilor la titlurile de stat Fidelis și Tezaur emise de Ministerul Finanțelor din România." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"
          integrity="sha384-NrKB+u6Ts6AtkIhwPixiKTzgSKNblyhlk0Sohlgar9UHUBzai/sgnNNWWd291xqt"
          crossorigin="anonymous"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0d0f14;
      --surface: #151820;
      --border:  #252a35;
      --text:    #e2e8f0;
      --muted:   #8896a8;
      --accent:  #4f8ef7;
      --green:   #34d399;
      --radius:  12px;
      --gap:     1.75rem;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.6;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      text-align: center;
      padding: 2.75rem 1.25rem 1.5rem;
      border-bottom: 1px solid var(--border);
    }
    .eyebrow {
      display: inline-block;
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 0.55rem;
    }
    header h1 {
      font-size: clamp(1.5rem, 5vw, 2.4rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1.2;
    }
    header h1 span { color: var(--accent); }
    .subtitle {
      margin-top: 0.45rem;
      color: var(--muted);
      font-size: 0.88rem;
    }

    /* ── Layout ── */
    main {
      max-width: 880px;
      margin: 0 auto;
      padding: var(--gap) 1rem 3.5rem;
      display: flex;
      flex-direction: column;
      gap: var(--gap);
    }

    /* ── Card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .card-header {
      padding: 1rem 1.25rem 0.85rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }
    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .tezaur-card .dot { background: var(--green); box-shadow: 0 0 7px var(--green); }
    .fidelis-card .dot { background: var(--accent); box-shadow: 0 0 7px var(--accent); }

    .card-header h2 {
      font-size: 0.97rem;
      font-weight: 600;
    }
    .badge {
      margin-left: auto;
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 0.17rem 0.5rem;
      border-radius: 999px;
      background: rgba(255,255,255,0.06);
      color: var(--muted);
      white-space: nowrap;
    }

    /* ── Tabs ── */
    .tab-bar {
      display: flex;
      gap: 0.4rem;
      padding: 0.65rem 1.25rem 0;
      border-bottom: 1px solid var(--border);
    }
    .tab-btn {
      background: none;
      border: 1px solid transparent;
      color: var(--muted);
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      padding: 0.28rem 0.8rem;
      border-radius: 6px;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s, background 0.15s;
    }
    .tab-btn:hover { color: var(--text); }
    .tab-btn.active {
      color: var(--accent);
      border-color: var(--accent);
      background: rgba(79,142,247,0.1);
    }

    /* ── Chart panels ── */
    .chart-panel { display: none; }
    .chart-panel.active { display: block; }

    /* ── Fixed legend ── */
    .chart-legend {
      display: flex;
      flex-wrap: wrap;
      gap: 0.3rem 0.75rem;
      padding: 0.6rem 1rem 0.5rem;
      border-bottom: 1px solid var(--border);
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      font-size: 0.75rem;
      color: #9aa;
      background: none;
      border: none;
      cursor: pointer;
      padding: 0.15rem 0;
      transition: opacity 0.15s;
    }
    .legend-item:hover { color: var(--text); }
    .legend-item.legend-hidden { opacity: 0.3; }
    .legend-swatch {
      width: 10px; height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* Scrollable chart container */
    .chart-outer {
      position: relative;
    }
    /* Fade hint on the right when chart overflows */
    .chart-outer::after {
      content: '';
      position: absolute;
      bottom: 0; right: 0;
      width: 40px;
      height: calc(100% - var(--legend-h, 40px));
      background: linear-gradient(to right, transparent, var(--surface));
      pointer-events: none;
      opacity: 1;
      transition: opacity 0.2s;
    }
    .chart-outer.scrolled-end::after { opacity: 0; }

    .chart-wrap {
      overflow-x: auto;
      overflow-y: hidden;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
      /* height set by JS */
    }
    .chart-wrap::-webkit-scrollbar { height: 4px; }
    .chart-wrap::-webkit-scrollbar-track { background: transparent; }
    .chart-wrap::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .chart-wrap canvas {
      /* width & height set by JS */
      display: block;
    }

    /* ── Footer ── */
    footer {
      text-align: center;
      padding: 1.25rem 1rem 2.5rem;
      border-top: 1px solid var(--border);
      color: var(--muted);
      font-size: 0.75rem;
      line-height: 2;
    }
    footer a { color: var(--accent); text-decoration: none; }
    footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>

<header>
  <h1>Evoluția Dobânzilor</h1>
  <p class="subtitle">Fidelis &amp; Tezaur · România &nbsp;·&nbsp; <span style="opacity:.6">Bond Yield History</span></p>
</header>

<main>

  <!-- Tezaur -->
  <article class="card tezaur-card">
    <div class="card-header">
      <span class="dot"></span>
      <h2>Tezaur</h2>
      <span class="badge">Subscriere directă · RON</span>
    </div>
    <div class="chart-panel active">
      <div class="chart-outer">
        <div class="chart-wrap"><canvas id="tezaurChart"></canvas></div>
      </div>
    </div>
  </article>

  <!-- Fidelis -->
  <article class="card fidelis-card">
    <div class="card-header">
      <span class="dot"></span>
      <h2>Fidelis</h2>
      <span class="badge">Piață secundară</span>
    </div>
    <div class="tab-bar">
      <button class="tab-btn active" data-target="ron-panel">RON</button>
      <button class="tab-btn"        data-target="eur-panel">EUR</button>
    </div>
    <div id="ron-panel" class="chart-panel active">
      <div class="chart-outer">
        <div class="chart-wrap"><canvas id="ronChart"></canvas></div>
      </div>
    </div>
    <div id="eur-panel" class="chart-panel">
      <div class="chart-outer">
        <div class="chart-wrap"><canvas id="eurChart"></canvas></div>
      </div>
    </div>
  </article>

</main>

<footer>
  Date publicate de
  <a href="https://www.mfinante.gov.ro" target="_blank" rel="noopener noreferrer">Ministerul Finanțelor</a>
  &nbsp;·&nbsp; Grafice cu <a href="https://www.chartjs.org" target="_blank" rel="noopener noreferrer">Chart.js</a>
  <br>Informațiile au caracter informativ și nu constituie recomandare de investiție.
</footer>

<script>
// ── Colors ───────────────────────────────────────────────────────
const T_CLR = {1:'#ff6384',2:'#36a2eb',3:'#ffce56',5:'#9966ff'};
const F_CLR = {1:'#ff6384',2:'#36a2eb',3:'#ffce56',4:'#4bc0c0',5:'#9966ff',6:'#ff9f40',7:'#00ff88',10:'#ff00ff','2d':'#e8ff00'};

// ── Load data from JSON files ────────────────────────────────────
let _eurData = [];
let _eurBuilt = false;

Promise.all([
  fetch('data/tezaur.json').then(r => r.json()),
  fetch('data/fidelis.json').then(r => r.json()),
]).then(([tezaur, fidelis]) => {
  _eurData = fidelis.eur;
  buildChart(tezaur,       'tezaurChart', T_CLR);
  buildChart(fidelis.ron,  'ronChart',    F_CLR);
}).catch(err => console.error('Failed to load data:', err));

// ── Chart builder ─────────────────────────────────────────────
const PX_PER_LABEL = 18; // minimum pixels allocated per x-axis label
const CHART_HEIGHT = 300;

function buildChart(raw, canvasId, colorMap) {
  const labels = [];
  raw.forEach(e => { if (!labels.includes(e.d)) labels.push(e.d); });

  const mats = [...new Set(raw.map(e => e.m))].sort((a, b) => {
    const n = v => v === '2d' ? 2.5 : Number(v);
    return n(a) - n(b);
  });

  const map = {};
  raw.forEach(e => {
    if (!map[e.m]) map[e.m] = {};
    map[e.m][e.d] = e.r;
  });

  const canvas = document.getElementById(canvasId);
  const wrap   = canvas.closest('.chart-wrap');
  const outer  = canvas.closest('.chart-outer');

  // Canvas width: at least fill the container, but give each label its own space
  const containerW = outer.clientWidth || window.innerWidth;
  const chartW     = Math.max(containerW, labels.length * PX_PER_LABEL);

  canvas.style.width  = chartW + 'px';
  canvas.style.height = CHART_HEIGHT + 'px';
  wrap.style.height   = CHART_HEIGHT + 'px';

  // Fade hint: hide when scrolled to end
  wrap.addEventListener('scroll', () => {
    const atEnd = wrap.scrollLeft + wrap.clientWidth >= wrap.scrollWidth - 4;
    outer.classList.toggle('scrolled-end', atEnd);
  }, { passive: true });
  if (chartW <= containerW) outer.classList.add('scrolled-end');

  const datasets = mats.map(m => ({
    label: m === '2d' ? '2 ani (dona)' : m + ' ani',
    data: labels.map(lbl => map[m]?.[lbl] ?? null),
    borderColor: colorMap[m] || '#fff',
    backgroundColor: colorMap[m] || '#fff',
    fill: false,
    tension: 0.3,
    pointRadius: labels.map(lbl => map[m]?.[lbl] != null ? 4 : 0),
    pointHoverRadius: 7,
    spanGaps: false,
    borderWidth: 2,
  }));

  // Build fixed HTML legend (sits above the scrollable wrap)
  const legendEl = document.createElement('div');
  legendEl.className = 'chart-legend';
  datasets.forEach((ds, i) => {
    const btn = document.createElement('button');
    btn.className = 'legend-item';
    btn.innerHTML = `<span class="legend-swatch" style="background:${ds.borderColor}"></span>${ds.label}`;
    btn.dataset.idx = i;
    legendEl.appendChild(btn);
  });
  outer.insertBefore(legendEl, wrap);

  const chart = new Chart(canvas, {
    type: 'line',
    data: { labels, datasets },
    options: {
      responsive: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: 'rgba(10,12,18,0.92)',
          borderColor: '#252a35',
          borderWidth: 1,
          titleColor: '#cdd',
          bodyColor: '#aab',
          padding: 10,
          callbacks: {
            label: ctx => ctx.parsed.y != null ? `${ctx.dataset.label}: ${ctx.parsed.y}%` : null,
          },
        },
      },
      scales: {
        x: {
          ticks: {
            color: '#667',
            maxRotation: 45,
            minRotation: 30,
            font: { size: 9 },
          },
          grid: { color: 'rgba(255,255,255,0.05)' },
        },
        y: {
          ticks: {
            color: '#667',
            font: { size: 10 },
            callback: v => v + '%',
          },
          grid: { color: 'rgba(255,255,255,0.05)' },
        },
      },
    },
  });

  // Scroll to the right (most recent data) after the chart paints
  requestAnimationFrame(() => { wrap.scrollLeft = wrap.scrollWidth; });

  // Wire up legend toggle clicks
  legendEl.querySelectorAll('.legend-item').forEach(btn => {
    btn.addEventListener('click', () => {
      const i = Number(btn.dataset.idx);
      const visible = chart.isDatasetVisible(i);
      chart.setDatasetVisibility(i, !visible);
      chart.update();
      btn.classList.toggle('legend-hidden', visible);
    });
  });
}

// ── Tab switching (EUR built lazily when tab first opened) ──
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const card = btn.closest('.fidelis-card');
    card.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    card.querySelectorAll('.chart-panel').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById(btn.dataset.target).classList.add('active');
    if (btn.dataset.target === 'eur-panel' && !_eurBuilt && _eurData.length) {
      buildChart(_eurData, 'eurChart', F_CLR);
      _eurBuilt = true;
    }
  });
});
</script>
</body>
</html>
