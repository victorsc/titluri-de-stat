<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Titluri de Stat România — Fidelis &amp; Tezaur</title>
  <meta name="description" content="Evoluția dobânzilor la titlurile de stat Fidelis și Tezaur emise de Ministerul Finanțelor din România." />
  <link rel="canonical" href="https://victorsc.github.io/titluri-de-stat/" />
  <meta property="og:title" content="Titluri de Stat România — Fidelis &amp; Tezaur" />
  <meta property="og:description" content="Evoluția dobânzilor la titlurile de stat Fidelis și Tezaur, 2020–prezent." />
  <meta property="og:image" content="https://victorsc.github.io/titluri-de-stat/docs/preview.png" />
  <meta property="og:url" content="https://victorsc.github.io/titluri-de-stat/" />
  <meta property="og:type" content="website" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Titluri de Stat România — Fidelis &amp; Tezaur" />
  <meta name="twitter:description" content="Evoluția dobânzilor la titlurile de stat Fidelis și Tezaur, 2020–prezent." />
  <meta name="twitter:image" content="https://victorsc.github.io/titluri-de-stat/docs/preview.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preload" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" as="style" onload="this.rel='stylesheet'" />
  <noscript><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" /></noscript>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0d0f14;
      --surface: #151820;
      --border:  #252a35;
      --text:    #e2e8f0;
      --muted:   #8896a8;
      --accent:  #4f8ef7;
      --green:   #34d399;
      --radius:  12px;
      --gap:     1.75rem;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.6;
      min-height: 100vh;
    }

    /* ── A7: Skip link ── */
    .skip-link {
      position: absolute;
      top: -100%;
      left: 1rem;
      z-index: 9999;
      padding: 0.5rem 1rem;
      background: var(--accent);
      color: #fff;
      font-size: 0.85rem;
      font-weight: 600;
      border-radius: 0 0 var(--radius) var(--radius);
      text-decoration: none;
    }
    .skip-link:focus { top: 0; }

    /* ── A8: Focus-visible ring ── */
    :focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
      border-radius: 4px;
    }

    /* ── Header ── */
    header {
      text-align: center;
      padding: 2.75rem 1.25rem 1.5rem;
      border-bottom: 1px solid var(--border);
    }
    .eyebrow {
      display: inline-block;
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 0.55rem;
    }
    header h1 {
      font-size: clamp(1.5rem, 5vw, 2.4rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1.2;
    }
    header h1 span { color: var(--accent); }
    .subtitle {
      margin-top: 0.45rem;
      color: var(--muted);
      font-size: 0.88rem;
    }
    /* A1: explicit color instead of opacity so contrast is maintained */
    .subtitle-secondary { color: var(--muted); }

    /* ── Layout ── */
    main {
      max-width: 880px;
      margin: 0 auto;
      padding: var(--gap) 1rem 3.5rem;
      display: flex;
      flex-direction: column;
      gap: var(--gap);
    }

    /* ── Card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .tezaur-card { border-top: 2px solid var(--green); }
    .fidelis-card { border-top: 2px solid var(--accent); }

    .card-header {
      padding: 1rem 1.25rem 0.85rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }
    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .tezaur-card .dot { background: var(--green); box-shadow: 0 0 7px var(--green); }
    .fidelis-card .dot { background: var(--accent); box-shadow: 0 0 7px var(--accent); }

    .card-header h2 {
      font-size: 0.97rem;
      font-weight: 600;
    }
    .badge {
      margin-left: auto;
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 0.17rem 0.5rem;
      border-radius: 999px;
      background: rgba(255,255,255,0.06);
      color: var(--muted);
      white-space: nowrap;
    }

    /* ── Latest rates strip ── */
    .rates-strip {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.4rem 0.5rem;
      padding: 0.6rem 1.25rem;
      border-bottom: 1px solid var(--border);
      background: rgba(255,255,255,0.02);
    }
    .strip-date {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--muted);
      margin-right: 0.25rem;
      white-space: nowrap;
    }
    .rate-pill {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      font-size: 0.72rem;
      font-weight: 500;
      padding: 0.2rem 0.55rem;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.04);
      color: var(--text);
      white-space: nowrap;
    }
    .rate-pill .pill-label {
      color: var(--muted);
      font-weight: 400;
    }
    .rate-pill .pill-value {
      font-weight: 700;
      font-variant-numeric: tabular-nums;
    }

    /* ── A6: Tabs ── */
    .tab-bar {
      display: flex;
      gap: 0.4rem;
      padding: 0.65rem 1.25rem 0;
      border-bottom: 1px solid var(--border);
    }
    .tab-btn {
      background: none;
      border: 1px solid transparent;
      color: var(--muted);
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      padding: 0.28rem 0.8rem;
      border-radius: 6px;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s, background 0.15s;
    }
    .tab-btn:hover { color: var(--text); }
    .tab-btn[aria-selected="true"] {
      color: var(--accent);
      border-color: var(--accent);
      background: rgba(79,142,247,0.1);
    }

    /* ── Chart panels ── */
    .chart-panel { display: none; min-height: 340px; }
    .chart-panel.active { display: block; }

    /* ── Fixed legend ── */
    .chart-legend {
      display: flex;
      flex-wrap: wrap;
      gap: 0.3rem 0.75rem;
      padding: 0.6rem 1rem 0.5rem;
      border-bottom: 1px solid var(--border);
      role: group;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      font-size: 0.75rem;
      color: #9aa;
      background: none;
      border: none;
      cursor: pointer;
      padding: 0.15rem 0.25rem;
      min-height: 24px;
      border-radius: 4px;
      transition: opacity 0.15s, color 0.15s;
    }
    .legend-item:hover { color: var(--text); }
    .legend-item[aria-pressed="false"] { opacity: 0.3; }
    .legend-swatch {
      width: 10px; height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* ── A3: Scrollable chart container ── */
    .chart-outer {
      position: relative;
    }
    .chart-outer::after {
      content: '';
      position: absolute;
      bottom: 0; right: 0;
      width: 40px;
      height: calc(100% - var(--legend-h, 40px));
      background: linear-gradient(to right, transparent, var(--surface));
      pointer-events: none;
      opacity: 1;
      transition: opacity 0.2s;
    }
    .chart-outer.scrolled-end::after { opacity: 0; }

    .chart-wrap {
      overflow-x: auto;
      overflow-y: hidden;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
      /* A3: keyboard accessible scrollable region */
      tabindex: 0;
    }
    .chart-wrap:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: -2px;
    }
    .chart-wrap::-webkit-scrollbar { height: 4px; }
    .chart-wrap::-webkit-scrollbar-track { background: transparent; }
    .chart-wrap::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .chart-wrap canvas {
      display: block;
    }

    /* ── Loading skeleton ── */
    .chart-skeleton {
      height: 300px;
      display: flex;
      align-items: flex-end;
      gap: 6px;
      padding: 1.5rem 1rem 2rem;
    }
    .chart-skeleton.hidden { display: none; }
    .skel-bar {
      flex: 1;
      border-radius: 3px 3px 0 0;
      background: linear-gradient(180deg, rgba(255,255,255,0.07) 0%, rgba(255,255,255,0.03) 100%);
      animation: skel-pulse 1.4s ease-in-out infinite;
    }
    @keyframes skel-pulse {
      0%, 100% { opacity: 0.5; }
      50%       { opacity: 1; }
    }

    /* ── Footer ── */
    footer {
      text-align: center;
      padding: 1.25rem 1rem 2.5rem;
      border-top: 1px solid var(--border);
      color: var(--muted);
      font-size: 0.75rem;
      line-height: 2;
    }
    /* A2: always underline footer links so they're distinguishable without color */
    footer a {
      color: var(--accent);
      text-decoration: underline;
      text-underline-offset: 2px;
    }
    footer a:hover { text-decoration-thickness: 2px; }
  </style>
</head>
<body>

<!-- A7: Skip link for keyboard users -->
<a class="skip-link" href="#main-content">Sari la conținut</a>

<header>
  <h1>Evoluția Dobânzilor</h1>
  <!-- A1: explicit color class instead of opacity:.6 -->
  <p class="subtitle">Fidelis &amp; Tezaur · România &nbsp;·&nbsp; <span class="subtitle-secondary">Bond Yield History</span></p>
</header>

<main id="main-content">

  <!-- Tezaur -->
  <article class="card tezaur-card">
    <div class="card-header">
      <span class="dot" aria-hidden="true"></span>
      <h2>Tezaur</h2>
      <span class="badge">Subscriere directă · RON</span>
    </div>
    <div class="rates-strip" id="tezaur-rates" aria-label="Ultimele rate Tezaur"></div>
    <div class="chart-panel active">
      <div class="chart-skeleton" id="skel-tezaur" aria-hidden="true">
        <div class="skel-bar" style="height:55%"></div><div class="skel-bar" style="height:70%"></div><div class="skel-bar" style="height:60%"></div><div class="skel-bar" style="height:80%"></div><div class="skel-bar" style="height:65%"></div><div class="skel-bar" style="height:90%"></div><div class="skel-bar" style="height:75%"></div><div class="skel-bar" style="height:85%"></div><div class="skel-bar" style="height:70%"></div><div class="skel-bar" style="height:95%"></div>
      </div>
      <div class="chart-outer">
        <div class="chart-wrap"><canvas id="tezaurChart"></canvas></div>
      </div>
    </div>
  </article>

  <!-- Fidelis -->
  <article class="card fidelis-card">
    <div class="card-header">
      <span class="dot" aria-hidden="true"></span>
      <h2>Fidelis</h2>
      <span class="badge">Piață secundară</span>
    </div>
    <!-- A6: proper tablist ARIA -->
    <div class="tab-bar" role="tablist" aria-label="Monedă Fidelis">
      <button class="tab-btn" role="tab" id="tab-ron" aria-selected="true"  aria-controls="ron-panel">RON</button>
      <button class="tab-btn" role="tab" id="tab-eur" aria-selected="false" aria-controls="eur-panel">EUR</button>
    </div>
    <div id="ron-panel" class="chart-panel active" role="tabpanel" aria-labelledby="tab-ron">
      <div class="rates-strip" id="fidelis-rates-ron"></div>
      <div class="chart-skeleton" id="skel-ron" aria-hidden="true">
        <div class="skel-bar" style="height:60%"></div><div class="skel-bar" style="height:75%"></div><div class="skel-bar" style="height:55%"></div><div class="skel-bar" style="height:85%"></div><div class="skel-bar" style="height:70%"></div><div class="skel-bar" style="height:95%"></div><div class="skel-bar" style="height:80%"></div><div class="skel-bar" style="height:65%"></div><div class="skel-bar" style="height:90%"></div><div class="skel-bar" style="height:75%"></div>
      </div>
      <div class="chart-outer">
        <div class="chart-wrap"><canvas id="ronChart"></canvas></div>
      </div>
    </div>
    <div id="eur-panel" class="chart-panel" role="tabpanel" aria-labelledby="tab-eur">
      <div class="rates-strip" id="fidelis-rates-eur"></div>
      <div class="chart-outer">
        <div class="chart-wrap"><canvas id="eurChart"></canvas></div>
      </div>
    </div>
  </article>

</main>

<footer>
  Date publicate de
  <a href="https://www.mfinante.gov.ro" target="_blank" rel="noopener noreferrer">Ministerul Finanțelor</a>
  &nbsp;·&nbsp; Grafice cu <a href="https://www.chartjs.org" target="_blank" rel="noopener noreferrer">Chart.js</a>
  <br>Informațiile au caracter informativ și nu constituie recomandare de investiție.
</footer>

<!-- P1: Chart.js vendored locally to eliminate CDN render-blocking -->
<script src="vendor/chart.umd.min.js" defer></script>
<script>
// ── Colors ───────────────────────────────────────────────────────
const T_CLR = {1:'#ff6384',2:'#36a2eb',3:'#ffce56',5:'#9966ff'};
const F_CLR = {1:'#ff6384',2:'#36a2eb',3:'#ffce56',4:'#4bc0c0',5:'#9966ff',6:'#ff9f40',7:'#00ff88',10:'#ff00ff','2d':'#e8ff00'};

// ── Load data from JSON files ────────────────────────────────────
let _eurData = [];
let _eurBuilt = false;

// ── Latest rates strip ────────────────────────────────────────────
function buildRatesStrip(raw, stripId, colorMap) {
  const strip = document.getElementById(stripId);
  if (!strip) return;
  const lastDate = raw[raw.length - 1]?.d;
  if (!lastDate) return;
  const latest = raw.filter(e => e.d === lastDate)
    .sort((a, b) => {
      const n = v => v === '2d' ? 2.5 : Number(v);
      return n(a.m) - n(b.m);
    });
  const pills = latest.map(e => {
    const label = e.m === '2d' ? '2 ani (dona)' : `${e.m} ${e.m === 1 ? 'an' : 'ani'}`;
    const color = colorMap[e.m] || '#fff';
    return `<span class="rate-pill">
      <span class="legend-swatch" aria-hidden="true" style="background:${color}"></span>
      <span class="pill-label">${label}</span>
      <span class="pill-value">${e.r}%</span>
    </span>`;
  }).join('');
  strip.innerHTML = `<span class="strip-date">${lastDate}</span>` + pills;
}

Promise.all([
  fetch('data/tezaur.json').then(r => r.json()),
  fetch('data/fidelis.json').then(r => r.json()),
]).then(([tezaur, fidelis]) => {
  _eurData = fidelis.eur;
  buildRatesStrip(tezaur,      'tezaur-rates',     T_CLR);
  buildRatesStrip(fidelis.ron, 'fidelis-rates-ron', F_CLR);
  buildChart(tezaur,      'tezaurChart', T_CLR, 'Evoluție dobânzi Tezaur RON');
  buildChart(fidelis.ron, 'ronChart',    F_CLR, 'Evoluție dobânzi Fidelis RON');
}).catch(err => console.error('Failed to load data:', err));

// ── Chart builder ─────────────────────────────────────────────
const PX_PER_LABEL = 18;
const CHART_HEIGHT = 300;

function buildChart(raw, canvasId, colorMap, ariaLabel) {
  const labels = [];
  raw.forEach(e => { if (!labels.includes(e.d)) labels.push(e.d); });

  const mats = [...new Set(raw.map(e => e.m))].sort((a, b) => {
    const n = v => v === '2d' ? 2.5 : Number(v);
    return n(a) - n(b);
  });

  const map = {};
  raw.forEach(e => {
    if (!map[e.m]) map[e.m] = {};
    map[e.m][e.d] = e.r;
  });

  const canvas = document.getElementById(canvasId);
  const wrap   = canvas.closest('.chart-wrap');
  const outer  = canvas.closest('.chart-outer');

  // A4: canvas accessible label
  canvas.setAttribute('role', 'img');
  canvas.setAttribute('aria-label', `${ariaLabel}, ${labels[0]} până în ${labels[labels.length - 1]}`);

  // A3: keyboard scroll support
  wrap.setAttribute('tabindex', '0');
  wrap.setAttribute('aria-label', `${ariaLabel} — derulați orizontal`);
  wrap.addEventListener('keydown', e => {
    if (e.key === 'ArrowRight') { wrap.scrollLeft += 60; e.preventDefault(); }
    if (e.key === 'ArrowLeft')  { wrap.scrollLeft -= 60; e.preventDefault(); }
  });

  const containerW = outer.clientWidth || window.innerWidth;
  const chartW     = Math.max(containerW, labels.length * PX_PER_LABEL);

  canvas.style.width  = chartW + 'px';
  canvas.style.height = CHART_HEIGHT + 'px';
  wrap.style.height   = CHART_HEIGHT + 'px';

  wrap.addEventListener('scroll', () => {
    const atEnd = wrap.scrollLeft + wrap.clientWidth >= wrap.scrollWidth - 4;
    outer.classList.toggle('scrolled-end', atEnd);
  }, { passive: true });
  if (chartW <= containerW) outer.classList.add('scrolled-end');

  const datasets = mats.map(m => ({
    label: m === '2d' ? '2 ani (dona)' : m + ' ani',
    data: labels.map(lbl => map[m]?.[lbl] ?? null),
    borderColor: colorMap[m] || '#fff',
    backgroundColor: colorMap[m] || '#fff',
    fill: false,
    tension: 0.3,
    pointRadius: labels.map(lbl => map[m]?.[lbl] != null ? 4 : 0),
    pointHoverRadius: 7,
    spanGaps: false,
    borderWidth: 2,
  }));

  // A5: legend with aria-pressed
  const legendEl = document.createElement('div');
  legendEl.className = 'chart-legend';
  legendEl.setAttribute('role', 'group');
  legendEl.setAttribute('aria-label', 'Filtrează maturități');
  datasets.forEach((ds, i) => {
    const btn = document.createElement('button');
    btn.className = 'legend-item';
    btn.setAttribute('aria-pressed', 'true');
    btn.setAttribute('aria-label', `Afișează ${ds.label}`);
    btn.innerHTML = `<span class="legend-swatch" aria-hidden="true" style="background:${ds.borderColor}"></span>${ds.label}`;
    btn.dataset.idx = i;
    legendEl.appendChild(btn);
  });
  outer.insertBefore(legendEl, wrap);

  const chart = new Chart(canvas, {
    type: 'line',
    data: { labels, datasets },
    options: {
      responsive: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: 'rgba(10,12,18,0.92)',
          borderColor: '#252a35',
          borderWidth: 1,
          titleColor: '#cdd',
          bodyColor: '#aab',
          padding: 10,
          callbacks: {
            label: ctx => ctx.parsed.y != null ? `${ctx.dataset.label}: ${ctx.parsed.y}%` : null,
          },
        },
      },
      scales: {
        x: {
          ticks: { color: '#778', maxRotation: 45, minRotation: 30, font: { size: 9 } },
          grid: { color: 'rgba(255,255,255,0.08)' },
        },
        y: {
          ticks: { color: '#778', font: { size: 10 }, callback: v => v + '%' },
          grid: { color: 'rgba(255,255,255,0.08)' },
        },
      },
    },
  });

  requestAnimationFrame(() => {
    wrap.scrollLeft = wrap.scrollWidth;
    const panel = canvas.closest('.chart-panel');
    panel?.querySelector('.chart-skeleton')?.classList.add('hidden');
  });

  // A5: toggle aria-pressed on legend click
  legendEl.querySelectorAll('.legend-item').forEach(btn => {
    btn.addEventListener('click', () => {
      const i = Number(btn.dataset.idx);
      const visible = chart.isDatasetVisible(i);
      chart.setDatasetVisibility(i, !visible);
      chart.update();
      btn.setAttribute('aria-pressed', String(!visible));
    });
  });
}

// ── A6: Tab switching with proper ARIA ──
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const card = btn.closest('.fidelis-card');
    card.querySelectorAll('.tab-btn').forEach(b => {
      b.classList.remove('active');
      b.setAttribute('aria-selected', 'false');
    });
    card.querySelectorAll('.chart-panel').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    btn.setAttribute('aria-selected', 'true');
    document.getElementById(btn.getAttribute('aria-controls')).classList.add('active');
    if (btn.id === 'tab-eur' && !_eurBuilt && _eurData.length) {
      buildRatesStrip(_eurData, 'fidelis-rates-eur', F_CLR);
      buildChart(_eurData, 'eurChart', F_CLR, 'Evoluție dobânzi Fidelis EUR');
      _eurBuilt = true;
    }
  });
});
</script>
<script data-goatcounter="https://victorsc.goatcounter.com/count"
        async src="//gc.zgo.at/count.js"></script>
</body>
</html>
