name: Update bond data

on:
  schedule:
    # 08:00 UTC on the 1st and 15th of every month
    - cron: '0 8 1,15 * *'
  workflow_dispatch: # allow manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: scripts/package.json

      - name: Install dependencies
        run: npm install
        working-directory: scripts

      - name: Run scraper
        run: node scripts/scrape.js

      - name: Commit & push if data changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No new data — skipping commit."
          else
            git commit -m "chore: auto-update bond data [skip ci]"
            git push
          fi
