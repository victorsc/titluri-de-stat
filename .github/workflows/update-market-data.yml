name: Update market data

on:
  schedule:
    # 21:00 UTC daily — after BVB close and the source's 15-minute processing delay
    - cron: '0 21 * * *'
  workflow_dispatch: # allow manual trigger from GitHub UI

permissions:
  contents: write
  actions: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '24'

      - name: Fetch market data
        run: node scripts/fetch-market.js

      - name: Commit & push if data changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/fidelis_yields.json
          if git diff --cached --quiet; then
            echo "No new data — skipping commit."
          else
            git commit -m "chore: auto-update market data $(date +'%Y-%m-%d') [skip ci]"
            git push
            gh workflow run deploy.yml --ref main
          fi
